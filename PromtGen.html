<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Prompt Generator | Smart Prompt Engineering</title>
  <link rel="stylesheet" href="PromtGen.css">
  <!-- Google Fonts for modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="app-container">
    <div class="theme-toggle-wrapper">
      <button id="themeToggleBtn" class="theme-toggle" aria-label="Switch between dark and light mode">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
      </button>
    </div>

    <div class="card glass-card">
      <div class="header">
        <div class="logo-icon">
          <i class="fas fa-magic"></i>
        </div>
        <h1>AI Prompt Generator</h1>
        <p class="subhead">Transform your ideas into powerful, structured prompts</p>
      </div>

      <div class="form-group">
        <label for="userIdea"><i class="fas fa-lightbulb"></i> Your idea / topic</label>
        <textarea id="userIdea" rows="3" placeholder="e.g., Explain quantum computing to a 10-year-old, create a React component for a login form, or write a funny Instagram caption about coffee..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="categorySelect"><i class="fas fa-tags"></i> Prompt Category</label>
          <select id="categorySelect">
            <option value="Blog">📝 Blog / Article</option>
            <option value="Code">💻 Code / Programming</option>
            <option value="Image">🎨 Image Generation (Midjourney/DALL·E)</option>
            <option value="Business">📈 Business & Marketing</option>
            <option value="Creative">✨ Creative Writing</option>
            <option value="Education">📚 Education & Learning</option>
          </select>
        </div>
        <div class="form-group half actions-buttons">
          <button id="generateBtn" class="btn primary-btn glow"><i class="fas fa-sparkles"></i> Generate Prompt</button>
          <button id="clearBtn" class="btn secondary-btn"><i class="fas fa-eraser"></i> Clear</button>
        </div>
      </div>

      <!-- Loading overlay inside card -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-container">
          <div class="dot-spinner"></div>
          <p class="loading-text">Crafting your AI prompt...</p>
        </div>
      </div>

      <div class="output-section">
        <div class="output-header">
          <label><i class="fas fa-reply-all"></i> Generated Prompt</label>
          <div class="output-actions">
            <button id="copyBtn" class="icon-btn" title="Copy to clipboard"><i class="fas fa-copy"></i> Copy</button>
            <button id="downloadBtn" class="icon-btn" title="Download as .txt"><i class="fas fa-download"></i> Download</button>
          </div>
        </div>
        <div id="outputText" class="output-content">
          <span class="placeholder-text">✨ Your professional prompt will appear here...</span>
        </div>
      </div>

      <!-- History Panel -->
      <div class="history-section">
        <div class="history-header">
          <h3><i class="fas fa-clock"></i> Prompt History</h3>
          <button id="clearHistoryBtn" class="small-clear-btn" title="Clear all history"><i class="fas fa-trash-alt"></i> Clear history</button>
        </div>
        <div id="historyList" class="history-list">
          <div class="empty-history">No history yet. Generated prompts will be saved.</div>
        </div>
      </div>
    </div>

    <footer class="footer-note">
      <span>✨ AI-enhanced prompt engineering | Powered by Gemini API</span>
    </footer>
  </div>

  <!-- config.js holds API_KEY -->
  <script src="Config.js"></script>
  <script src="Script.js"></script>
</body>
</html>
